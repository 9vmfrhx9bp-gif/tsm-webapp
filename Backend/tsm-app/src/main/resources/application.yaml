spring:
  application:
    name: tsm-app
  datasource:
    url: jdbc:postgresql://server:8081/tsm_backend
    username: postgres
    password: ${database_password}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database: postgresql
    show-sql: true
server:
  port: 443
  ssl:
    key-store: keystore.p12
    key-store-password: ${keystore_password}
    keyStoreType: PKCS12
    keyAlias: tomcat

deployment:
  host: ${host}
  port: ${port}
